<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>English Today ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0c14;
  --surface: #17152b;
  --surface2: #211e35;
  --border: rgba(255,255,255,0.07);
  --accent: #ff6b6b;
  --gold: #ffd166;
  --green: #06d6a0;
  --blue: #4cc9f0;
  --text: #f0eeff;
  --muted: #8b8aab;
  --radius: 18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 10%, rgba(255,107,107,0.09) 0%,transparent 60%),
    radial-gradient(ellipse 500px 500px at 90% 90%, rgba(76,201,240,0.07) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:20px 16px 100px;}

.header{text-align:center;padding:28px 0 18px;}
.header h1{
  font-family:'Playfair Display',serif;font-size:2.1rem;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#ff6b6b 0%,#ffd166 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{color:var(--muted);font-size:0.82rem;margin-top:5px;font-weight:300;letter-spacing:0.3px;}

.level-wrap{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:4px;display:flex;gap:4px;margin-bottom:20px;}
.lbtn{
  flex:1;padding:9px 4px;border:none;border-radius:50px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;
  background:transparent;color:var(--muted);transition:all .25s;
}
.lbtn.active{
  background:linear-gradient(135deg,var(--accent),#ff9f43);
  color:#fff;box-shadow:0 4px 18px rgba(255,107,107,0.35);
}

.tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;padding:8px 15px;border-radius:50px;
  border:1px solid var(--border);background:transparent;
  font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;
  cursor:pointer;transition:all .2s;color:var(--muted);
}
.tab.active{background:var(--surface2);border-color:rgba(255,255,255,0.18);color:var(--text);}

.sec{display:none;}
.sec.active{display:block;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:12px;
}

/* WORD */
.word-card{position:relative;overflow:hidden;}
.word-card::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,209,102,0.08),transparent 70%);
  pointer-events:none;
}
.word-num{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px;}
.word-en{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--gold);margin-bottom:2px;}
.word-ko{font-size:0.95rem;color:var(--text);font-weight:500;margin-bottom:6px;}
.word-pos{display:inline-block;font-size:0.7rem;padding:2px 8px;border-radius:20px;background:rgba(6,214,160,0.12);color:var(--green);margin-bottom:10px;font-family:'DM Mono',monospace;}
.word-ex{font-size:0.85rem;color:var(--muted);line-height:1.7;font-style:italic;border-left:2px solid rgba(255,209,102,0.3);padding-left:10px;}
.word-ex span{color:var(--gold);font-style:normal;font-weight:500;}
.word-ex-ko{font-size:0.78rem;color:var(--muted);margin-top:5px;font-style:normal;}
.word-pron{font-size:0.78rem;color:var(--blue);font-family:'DM Mono',monospace;margin-bottom:4px;letter-spacing:0.02em;}

.word-dots{display:flex;gap:6px;justify-content:center;margin-top:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--surface2);cursor:pointer;transition:all .2s;}
.dot.active{background:var(--gold);}

/* IDIOMS */
.idiom-section{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.idiom-label{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--blue);margin-bottom:8px;letter-spacing:0.05em;}
.idiom-item{margin-bottom:8px;padding:8px 10px;background:rgba(76,201,240,0.05);border-radius:10px;border-left:2px solid rgba(76,201,240,0.3);}
.idiom-en{font-size:0.82rem;color:var(--blue);font-style:italic;margin-bottom:2px;}
.idiom-ko{font-size:0.75rem;color:var(--muted);}

/* DATE+WEATHER BAR */
.date-weather{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--muted);margin-bottom:14px;flex-wrap:wrap;}
.date-weather .dw-date{color:var(--text);font-weight:500;}
.date-weather .dw-day{color:var(--accent);}
.date-weather .dw-weather{display:flex;align-items:center;gap:4px;margin-left:auto;font-size:0.78rem;}
.date-weather .dw-temp{color:var(--gold);font-weight:500;}

.word-nav{display:flex;gap:10px;margin-top:14px;}
.wnbtn{
  flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.85rem;transition:all .2s;
}
.wnbtn.primary{background:linear-gradient(135deg,rgba(255,209,102,0.15),rgba(255,209,102,0.05));border-color:rgba(255,209,102,0.3);color:var(--gold);}

/* WRITING */
.sentence-prompt{
  font-family:'Playfair Display',serif;font-size:1.1rem;
  line-height:1.6;color:var(--text);margin-bottom:5px;
}
.sentence-ko{font-size:0.82rem;color:var(--muted);margin-bottom:14px;}
.write-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:14px;color:var(--text);
  font-family:'DM Mono',monospace;font-size:0.88rem;resize:none;min-height:68px;
  transition:border-color .2s;outline:none;
}
.write-input:focus{border-color:rgba(76,201,240,0.4);}
.check-btn{
  width:100%;margin-top:10px;padding:13px;border-radius:12px;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;
  background:linear-gradient(135deg,var(--blue),#7b5ea7);color:#fff;
  transition:all .25s;box-shadow:0 4px 15px rgba(76,201,240,0.2);
}
.check-btn:active{transform:scale(0.98);}
.write-feedback{
  margin-top:12px;padding:14px;border-radius:12px;font-size:0.85rem;line-height:1.7;
  display:none;
}
.write-feedback.correct{background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.25);color:var(--green);}
.write-feedback.wrong{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);color:#ff9a9a;}
.write-feedback.show{display:block;}
.next-sent{margin-top:10px;width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;display:none;}
.next-sent.show{display:block;}

/* QUIZ */
.quiz-progress{display:flex;gap:5px;margin-bottom:16px;}
.qp-dot{flex:1;height:4px;border-radius:2px;background:var(--surface2);transition:background .3s;}
.qp-dot.done{background:var(--green);}
.qp-dot.current{background:var(--accent);}
.quiz-q{font-size:1rem;font-weight:500;line-height:1.5;margin-bottom:16px;}
.quiz-word-hint{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:4px;}
.quiz-type-badge{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{
  padding:13px 10px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:0.85rem;text-align:center;transition:all .2s;color:var(--text);
}
.opt:active{transform:scale(0.97);}
.opt.correct{background:rgba(6,214,160,0.15);border-color:rgba(6,214,160,0.4);color:var(--green);}
.opt.wrong{background:rgba(255,107,107,0.12);border-color:rgba(255,107,107,0.3);color:var(--accent);}
.opt.reveal{background:rgba(6,214,160,0.1);border-color:rgba(6,214,160,0.3);color:var(--green);}
.quiz-result{text-align:center;margin-top:8px;font-size:0.85rem;color:var(--muted);min-height:22px;}
.quiz-next{width:100%;margin-top:12px;padding:12px;border-radius:12px;border:1px solid rgba(6,214,160,0.3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;background:rgba(6,214,160,0.08);color:var(--green);display:none;}
.quiz-next.show{display:block;}
.quiz-final{text-align:center;padding:24px 0;}
.quiz-score{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold);}
.quiz-score-label{font-size:0.85rem;color:var(--muted);margin-top:4px;}
.quiz-restart{margin-top:18px;padding:12px 28px;border-radius:50px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;background:linear-gradient(135deg,var(--accent),#ff9f43);color:#fff;box-shadow:0 4px 15px rgba(255,107,107,0.3);}

/* AI */
.ai-notice{
  font-size:0.75rem;color:var(--muted);text-align:center;
  margin-bottom:12px;padding:9px 12px;background:rgba(255,209,102,0.05);
  border-radius:8px;border:1px solid rgba(255,209,102,0.1);line-height:1.6;
}
.chat-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;min-height:220px;max-height:320px;overflow-y:auto;
  padding:14px;margin-bottom:12px;
  scrollbar-width:thin;
}
.chat-box::-webkit-scrollbar{width:3px;}
.chat-box::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px;}
.msg{margin-bottom:12px;animation:fadeUp .2s ease;}
.msg-role{font-size:0.7rem;font-family:'DM Mono',monospace;margin-bottom:4px;}
.msg.user .msg-role{color:var(--blue);}
.msg.ai .msg-role{color:var(--green);}
.msg-text{
  font-size:0.87rem;line-height:1.65;
  padding:10px 13px;border-radius:10px;display:inline-block;max-width:94%;
}
.msg.user .msg-text{background:rgba(76,201,240,0.1);border:1px solid rgba(76,201,240,0.15);}
.msg.ai .msg-text{background:rgba(6,214,160,0.07);border:1px solid rgba(6,214,160,0.12);}
.chat-row{display:flex;gap:8px;}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;
  transition:border-color .2s;
}
.chat-input:focus{border-color:rgba(76,201,240,0.35);}
.chat-send{
  padding:12px 16px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),#7b5ea7);color:#fff;
  font-size:1.1rem;transition:all .25s;box-shadow:0 3px 12px rgba(76,201,240,0.2);
}
.chat-send:disabled{opacity:0.4;cursor:not-allowed;}
.chat-send:active:not(:disabled){transform:scale(0.95);}
.quick-q{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.qq{
  padding:5px 11px;border-radius:50px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.75rem;transition:all .2s;
}
.qq:hover{background:var(--surface2);color:var(--text);}

/* STREAK */
.day-streak{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
.streak-icon{font-size:1.4rem;}
.streak-info{flex:1;}
.streak-label{font-size:0.7rem;color:var(--muted);}
.streak-val{font-size:1rem;font-weight:500;color:var(--gold);}
.prog-bar-wrap{height:4px;background:var(--surface2);border-radius:3px;margin-top:5px;}
.prog-bar{height:4px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .5s ease;}

.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* PASSWORD SCREEN */
#pw-screen{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.pw-box{
  width:320px;padding:36px 28px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;text-align:center;
}
.pw-box h2{
  font-family:'Playfair Display',serif;font-size:1.6rem;
  background:linear-gradient(135deg,#ff6b6b,#ffd166);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.pw-box p{font-size:0.82rem;color:var(--muted);margin-bottom:22px;}
.pw-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;
  text-align:center;letter-spacing:2px;transition:border-color .2s;
  margin-bottom:12px;
}
.pw-input:focus{border-color:rgba(255,107,107,0.4);}
.pw-btn{
  width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;
  background:linear-gradient(135deg,var(--accent),#ff9f43);color:#fff;
  box-shadow:0 4px 15px rgba(255,107,107,0.3);transition:all .25s;
}
.pw-btn:active{transform:scale(0.98);}
.pw-error{font-size:0.8rem;color:var(--accent);margin-top:10px;min-height:18px;}

.sec-title{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:14px;}
.sec-title span{color:var(--accent);}
</style>
</head>
<body>
<div id="pw-screen">
  <div class="pw-box">
    <h2>English Today ✦</h2>
    <p>비밀번호를 입력하세요</p>
    <input class="pw-input" type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()" />
    <button class="pw-btn" onclick="checkPw()">입장하기</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none;">

  <div class="header">
    <h1>English Today ✦</h1>
    <p>오늘도 한 걸음, 영어와 가까워지기</p>
  </div>

  <div class="day-streak">
    <div class="streak-icon">🔥</div>
    <div class="streak-info">
      <div class="streak-label">오늘의 학습 진도</div>
      <div class="streak-val" id="streakVal">0 / 3 완료</div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="level-wrap">
    <button class="lbtn active" onclick="setLevel('입문',this)">🌱 입문</button>
    <button class="lbtn" onclick="setLevel('초급',this)">🌿 초급</button>
    <button class="lbtn" onclick="setLevel('중급',this)">🌳 중급</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showSec('words',this)">📖 단어</button>
    <button class="tab" onclick="showSec('writing',this)">✍️ 따라쓰기</button>
    <button class="tab" onclick="showSec('quiz',this)">🎯 퀴즈</button>
    <button class="tab" onclick="showSec('ai',this)">🤖 AI 질문</button>
  </div>

  <!-- WORDS -->
  <div class="sec active" id="sec-words">
    <div class="date-weather">
      <span class="dw-date" id="dwDate"></span>
      <span class="dw-day" id="dwDay"></span>
      <span style="color:var(--accent);font-size:0.75rem;font-family:'DM Mono',monospace">✦ 매일 자동변경</span>
      <div class="dw-weather"><span id="dwIcon"></span><span class="dw-temp" id="dwTemp"></span></div>
    </div>
    <div class="card word-card" id="wordCard">
      <div class="word-num" id="wNum">01 / 05</div>
      <div class="word-en" id="wEn"></div>
      <div class="word-pron" id="wPron"></div>
      <div class="word-ko" id="wKo"></div>
      <div><span class="word-pos" id="wPos"></span></div>
      <div class="word-ex" id="wEx"></div>
      <div class="word-ex-ko" id="wExKo"></div>
      <div class="idiom-section" id="idiomSection">
        <div class="idiom-label">📌 관련 숙어</div>
        <div id="idiomList"></div>
      </div>
    </div>
    <div class="word-dots" id="wordDots"></div>
    <div class="word-nav" style="margin-top:12px;">
      <button class="wnbtn" onclick="prevWord()">← 이전</button>
      <button class="wnbtn primary" onclick="nextWord()">다음 →</button>
    </div>
  </div>

  <!-- WRITING -->
  <div class="sec" id="sec-writing">
    <div class="sec-title">문장 <span>따라쓰기</span></div>
    <div class="card">
      <div class="sentence-prompt" id="sentPrompt"></div>
      <div class="sentence-ko" id="sentKo"></div>
      <textarea class="write-input" id="writeInput" placeholder="여기에 영어 문장을 입력하세요..." rows="2"></textarea>
      <button class="check-btn" onclick="checkWriting()">✓ 확인하기</button>
      <div class="write-feedback" id="writeFeedback"></div>
      <button class="next-sent" id="nextSentBtn" onclick="nextSentence()">다음 문장 →</button>
    </div>
    <div class="card" style="font-size:0.82rem;color:var(--muted);line-height:1.6;">
      💡 <strong style="color:var(--text);">팁:</strong> 대소문자와 마침표까지 똑같이! 반복이 실력입니다.
    </div>
  </div>

  <!-- QUIZ -->
  <div class="sec" id="sec-quiz">
    <div class="sec-title">오늘의 <span>퀴즈</span></div>
    <div class="card" id="quizCard">
      <div class="quiz-progress" id="quizProgress"></div>
      <div id="quizInner"></div>
    </div>
  </div>

  <!-- AI -->
  <div class="sec" id="sec-ai">
    <div class="sec-title">🤖 AI <span>영어 선생님</span></div>
    <div class="ai-notice">
      💰 전송 버튼을 눌러야만 API 크레딧 소모 · 응답 최소화 설정됨
    </div>
    <div class="quick-q">
      <button class="qq" onclick="quickAsk(this)">이 단어 예문 더 알려줘</button>
      <button class="qq" onclick="quickAsk(this)">발음 어떻게 해?</button>
      <button class="qq" onclick="quickAsk(this)">비슷한 단어 알려줘</button>
      <button class="qq" onclick="quickAsk(this)">오늘 배운 거 정리해줘</button>
    </div>
    <div class="card" style="padding:0;">
      <div class="chat-box" id="chatBox">
        <div class="msg ai">
          <div class="msg-role">✦ AI 선생님</div>
          <div class="msg-text">안녕하세요! 영어 공부 중 궁금한 점이 있으면 뭐든 물어보세요 😊</div>
        </div>
      </div>
      <div style="padding:12px;">
        <div class="chat-row">
          <input class="chat-input" id="chatInput" placeholder="궁금한 거 물어보세요..." onkeydown="if(event.key==='Enter')sendChat()">
          <button class="chat-send" id="chatSend" onclick="sendChat()">↑</button>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
// ── 비밀번호 설정 (여기서 변경하세요) ──
const APP_PASSWORD = 'English2025!';

function checkPw(){
  const val = document.getElementById('pwInput').value;
  if(val === APP_PASSWORD){
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
  } else {
    const err = document.getElementById('pwError');
    err.textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value = '';

// ── 날짜 기반 단어 순환 ──
// 오늘 날짜(YYYYMMDD)를 숫자로 변환해 단어 풀에서 5개씩 순환
function getTodayOffset(poolSize) {
  const d = new Date();
  const key = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  const setsCount = Math.floor(poolSize / 5);
  return (key % setsCount) * 5;
}
function getTodayWords(pool) {
  const offset = getTodayOffset(pool.length);
  return pool.slice(offset, offset + 5);
}
function getTodayDateLabel() {
  const d = new Date();
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

const DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
function initDateWeather(){
  const d = new Date();
  document.getElementById('dwDate').textContent = `${d.getMonth()+1}월 ${d.getDate()}일`;
  document.getElementById('dwDay').textContent = DAYS[d.getDay()];
  // 날씨: Open-Meteo 무료 API (위치 자동 감지)
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const {latitude:lat,longitude:lon}=pos.coords;
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&timezone=auto`)
        .then(r=>r.json()).then(data=>{
          const temp=Math.round(data.current.temperature_2m);
          const code=data.current.weathercode;
          const icon=code===0?'☀️':code<=3?'⛅':code<=48?'🌫️':code<=67?'🌧️':code<=77?'❄️':code<=82?'🌦️':'⛈️';
          document.getElementById('dwIcon').textContent=icon;
          document.getElementById('dwTemp').textContent=`${temp}°C`;
        }).catch(()=>{});
    },()=>{
      document.getElementById('dwIcon').textContent='🌤️';
      document.getElementById('dwTemp').textContent='';
    });
  }
}

      {en:'The team collaborated effectively to meet the deadline.',ko:'팀은 마감일을 맞추기 위해 효과적으로 협력했어요.'},
      {en:'She demonstrated remarkable resilience in adversity.',ko:'그녀는 역경 속에서 놀라운 회복력을 보였어요.'},
      {en:'The implications of this decision are far-reaching.',ko:'이 결정의 영향은 광범위해요.'},
      {en:'A pragmatic approach will help solve the problem.',ko:'실용적인 접근이 문제 해결에 도움이 될 거예요.'},
      {en:'His tenacious attitude made him stand out.',ko:'그의 끈질긴 태도가 그를 돋보이게 했어요.'},
    ],
    quiz: [
      {type:'뜻 맞추기',word:'eloquent',q:'eloquent의 뜻은?',opts:['조용한','유창한','거친','예의 바른'],ans:1},
      {type:'영어 찾기',word:'인내',q:'"인내, 끈기"를 영어로?',opts:['patience','perseverance','performance','persistence'],ans:1},
      {type:'빈칸 채우기',word:'ambiguous',q:"The contract terms were ___; nobody understood them.",opts:['clear','ambiguous','detailed','final'],ans:1},
      {type:'뜻 맞추기',word:'contemplate',q:'contemplate의 뜻은?',opts:['무시하다','즐기다','심사숙고하다','포기하다'],ans:2},
      {type:'영어 찾기',word:'혁신적인',q:'"혁신적인"을 영어로?',opts:['traditional','innovative','ordinary','classic'],ans:1},
    ]
  }
};


let currentLevel='입문', wordIdx=0, sentIdx=0, quizIdx=0, quizScore=0, quizAnswered=false;
let completedSections=new Set(), chatHistory=[];
let todayWords=[];

function getTodayWords(pool){
  const d=new Date();
  const key=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  const setsCount=Math.floor(pool.length/5);
  const offset=(key%setsCount)*5;
  return pool.slice(offset,offset+5);
}
function getTodayDateLabel(){
  const d=new Date();
  return `${d.getMonth()+1}월 ${d.getDate()}일 오늘의 단어`;
}

function setLevel(lv,btn){
  currentLevel=lv;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  wordIdx=0;sentIdx=0;quizIdx=0;quizScore=0;
  todayWords=getTodayWords(DATA[currentLevel].words);
  completedSections.clear();updateProgress();
  renderWord();renderSentence();renderQuiz();
}

function showSec(id,btn){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
}

function renderWord(){
  const w=todayWords[wordIdx];
  document.getElementById('wNum').textContent=String(wordIdx+1).padStart(2,'0')+' / 05';
  document.getElementById('wEn').textContent=w.en;
  document.getElementById('wPron').textContent=w.pron?'[ '+w.pron+' ]':'';
  document.getElementById('wKo').textContent=w.ko;
  document.getElementById('wPos').textContent=w.pos;
  document.getElementById('wEx').innerHTML=w.ex.replace(/<(.+?)>/g,'<span>$1</span>');
  document.getElementById('wExKo').textContent=w.exKo;
  // 숙어 렌더링
  const idiomList=document.getElementById('idiomList');
  if(w.idioms&&w.idioms.length){
    document.getElementById('idiomSection').style.display='block';
    idiomList.innerHTML=w.idioms.map(id=>`<div class="idiom-item"><div class="idiom-en">${id.en}</div><div class="idiom-ko">${id.ko}</div></div>`).join('');
  } else {
    document.getElementById('idiomSection').style.display='none';
  }
  const dc=document.getElementById('wordDots');dc.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===wordIdx?' active':'');
    d.onclick=(i=>{return()=>{wordIdx=i;renderWord();};})(i);
    dc.appendChild(d);
  }
}
function prevWord(){if(wordIdx>0){wordIdx--;renderWord();}}
function nextWord(){
  if(wordIdx<4){wordIdx++;renderWord();}
  else if(!completedSections.has('words')){completedSections.add('words');updateProgress();}
}

function renderSentence(){
  const s=DATA[currentLevel].sentences[sentIdx];
  document.getElementById('sentPrompt').textContent=s.en;
  document.getElementById('sentKo').textContent=s.ko;
  document.getElementById('writeInput').value='';
  document.getElementById('writeFeedback').className='write-feedback';
  document.getElementById('nextSentBtn').className='next-sent';
}
function checkWriting(){
  const input=document.getElementById('writeInput').value.trim();
  const correct=DATA[currentLevel].sentences[sentIdx].en;
  const fb=document.getElementById('writeFeedback');
  if(!input){fb.textContent='문장을 입력해주세요!';fb.className='write-feedback wrong show';return;}
  if(input===correct){
    fb.innerHTML='✅ 완벽해요! 정확히 맞았습니다.';
    fb.className='write-feedback correct show';
    if(!completedSections.has('writing')&&sentIdx>=2){completedSections.add('writing');updateProgress();}
  } else if(input.toLowerCase()===correct.toLowerCase()){
    fb.innerHTML='⚡ 거의 맞았어요! 대소문자를 확인해보세요.<br><strong>정답:</strong> '+correct;
    fb.className='write-feedback wrong show';
  } else {
    fb.innerHTML='❌ 다시 시도해보세요.<br><strong>정답:</strong> <span style="color:var(--green)">'+correct+'</span>';
    fb.className='write-feedback wrong show';
  }
  document.getElementById('nextSentBtn').className='next-sent show';
}
function nextSentence(){sentIdx=(sentIdx+1)%DATA[currentLevel].sentences.length;renderSentence();}

function renderQuiz(){
  quizIdx=0;quizScore=0;quizAnswered=false;renderQuizQ();
}
function renderQuizQ(){
  const qs=DATA[currentLevel].quiz;
  const prog=document.getElementById('quizProgress');
  prog.innerHTML='';
  qs.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='qp-dot'+(i<quizIdx?' done':i===quizIdx?' current':'');
    prog.appendChild(d);
  });
  if(quizIdx>=qs.length){
    document.getElementById('quizInner').innerHTML=`
      <div class="quiz-final">
        <div class="quiz-score">${quizScore}<span style="font-size:1.4rem;color:var(--muted)">/${qs.length}</span></div>
        <div class="quiz-score-label">${quizScore===qs.length?'🎉 완벽한 점수!':quizScore>=3?'👍 잘 하셨어요!':'💪 다시 도전해보세요!'}</div>
        <button class="quiz-restart" onclick="renderQuiz()">다시 풀기</button>
      </div>`;
    if(!completedSections.has('quiz')){completedSections.add('quiz');updateProgress();}
    return;
  }
  const q=qs[quizIdx];quizAnswered=false;
  document.getElementById('quizInner').innerHTML=`
    <div class="quiz-type-badge"># ${q.type}</div>
    <div class="quiz-word-hint">${q.word}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="options" id="opts">
      ${q.opts.map((o,i)=>`<button class="opt" onclick="answerQuiz(${i})">${o}</button>`).join('')}
    </div>
    <div class="quiz-result" id="qResult"></div>
    <button class="quiz-next" id="qNext" onclick="nextQuiz()">다음 문제 →</button>`;
}
function answerQuiz(i){
  if(quizAnswered)return;quizAnswered=true;
  const q=DATA[currentLevel].quiz[quizIdx];
  document.querySelectorAll('.opt').forEach((o,idx)=>{
    if(idx===q.ans)o.classList.add(i===q.ans?'correct':'reveal');
    else if(idx===i)o.classList.add('wrong');
  });
  if(i===q.ans){quizScore++;document.getElementById('qResult').textContent='✅ 정답이에요!';}
  else{document.getElementById('qResult').textContent='❌ 틀렸어요. 초록색이 정답입니다.';}
  document.getElementById('qNext').className='quiz-next show';
}
function nextQuiz(){quizIdx++;renderQuizQ();}

function updateProgress(){
  const n=completedSections.size;
  document.getElementById('streakVal').textContent=n+' / 3 완료';
  document.getElementById('progBar').style.width=(n/3*100)+'%';
}

function quickAsk(btn){document.getElementById('chatInput').value=btn.textContent;sendChat();}

async function sendChat(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();if(!msg)return;
  const ctx=`현재 레벨: ${currentLevel}. 오늘의 단어: ${DATA[currentLevel].words.map(w=>w.en+'('+w.ko+')').join(', ')}.`;
  input.value='';
  appendMsg('user',msg);
  chatHistory.push({role:'user',content:msg});
  const btn=document.getElementById('chatSend');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system:`당신은 친절한 영어 선생님입니다. ${ctx} 짧고 명확하게 3-4문장으로만 답하세요. 한국어와 영어를 적절히 섞어 설명하세요.`,
        messages:chatHistory
      })
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'답변을 가져오지 못했어요.';
    chatHistory.push({role:'assistant',content:reply});
    appendMsg('ai',reply);
  }catch(e){appendMsg('ai','⚠️ 오류가 발생했어요. 잠시 후 다시 시도해주세요.');}
  btn.disabled=false;btn.innerHTML='↑';
}

function appendMsg(role,text){
  const box=document.getElementById('chatBox');
  const div=document.createElement('div');div.className='msg '+role;
  div.innerHTML=`<div class="msg-role">${role==='user'?'👤 나':'✦ AI 선생님'}</div><div class="msg-text">${text.replace(/\n/g,'<br>')}</div>`;
  box.appendChild(div);box.scrollTop=box.scrollHeight;
}

todayWords=getTodayWords(DATA[currentLevel].words);
initDateWeather();
renderWord();renderSentence();renderQuiz();

</script>
